<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>177のuser生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#f5f1ea;--card:#ffffff;--ink:#3a3128;--sub:#8a7e6f;
    --line:#e7ded0;--accent:#a8896b;--accent-d:#7d6650;
    --soft:#f0e8db;--ok:#7ba07b;--err:#c46a6a;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
    font-size:15px;line-height:1.6;}
  body{min-height:100vh;padding-bottom:40px;}

  header{padding:18px 18px 12px;text-align:center;background:var(--card);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  header h1{margin:0;font-size:17px;letter-spacing:1.5px;font-weight:600;}
  header .sub{color:var(--sub);font-size:11px;margin-top:3px;letter-spacing:3px;}

  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);
    position:sticky;top:60px;z-index:9;}
  .tab{flex:1;text-align:center;padding:11px 0;font-size:14px;color:var(--sub);
    cursor:pointer;border-bottom:2px solid transparent;transition:.2s;}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600;}

  main{padding:14px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:12px;}
  .card .ctitle{font-size:13px;font-weight:600;color:var(--accent-d);
    letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .card .ctitle::before{content:"";width:3px;height:12px;background:var(--accent);
    border-radius:2px;display:inline-block;}

  label{display:block;font-size:12px;color:var(--sub);margin:8px 0 4px;letter-spacing:.5px;}
  input,select,textarea{width:100%;border:1px solid var(--line);background:var(--soft);
    border-radius:9px;padding:9px 11px;font-size:14px;color:var(--ink);
    font-family:inherit;outline:none;transition:.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#fff;}
  textarea{resize:vertical;min-height:55px;overflow-y:auto;}
  textarea.compact{min-height:38px;}
  /* 修复 input 在长内容时可滚动 */
  input{text-overflow:ellipsis;}
  .row{display:flex;gap:8px;}
  .row > *{flex:1;min-width:0;}

  button{border:none;background:var(--accent);color:#fff;border-radius:9px;
    padding:10px 14px;font-size:14px;cursor:pointer;font-family:inherit;
    transition:.15s;letter-spacing:.5px;}
  button:hover{background:var(--accent-d);}
  button:disabled{opacity:.5;cursor:not-allowed;}
  button.ghost{background:transparent;color:var(--accent-d);border:1px solid var(--line);}
  button.ghost:hover{background:var(--soft);}
  button.danger{background:transparent;color:var(--err);border:1px solid var(--line);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .btn-row button{flex:1;min-width:80px;}

  .hint{font-size:11px;color:var(--sub);margin-top:4px;}
  .status{font-size:12px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none;}
  .status.show{display:block;}
  .status.ok{background:#eaf3ea;color:var(--ok);}
  .status.err{background:#f7e8e8;color:var(--err);}

  /* 选项标签 */
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;margin-bottom:4px;}
  .chip{font-size:12px;padding:4px 10px;border-radius:14px;background:#fff;
    border:1px solid var(--line);color:var(--sub);cursor:pointer;
    user-select:none;transition:.15s;line-height:1.4;}
  .chip:active{transform:scale(.95);}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  .user-card{background:linear-gradient(135deg,#fff 0%,#faf6ee 100%);
    border:1px solid var(--line);border-radius:14px;padding:18px;
    box-shadow:0 2px 12px rgba(168,137,107,.08);white-space:pre-wrap;
    font-size:14px;line-height:1.85;}
  .user-card h3{margin:0 0 4px;font-size:18px;letter-spacing:1px;}
  .user-card .stamp{color:var(--sub);font-size:11px;margin-bottom:12px;}

  .empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:13px;}

  .hist-item{background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .hist-item .hname{font-weight:600;font-size:15px;margin-bottom:2px;}
  .hist-item .hmeta{color:var(--sub);font-size:12px;margin-bottom:8px;}
  .hist-item .hbtns{display:flex;gap:6px;flex-wrap:wrap;}
  .hist-item .hbtns button{flex:1;padding:6px 8px;font-size:12px;}

  .loading{display:inline-block;width:14px;height:14px;border:2px solid #fff;
    border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .modal-mask{position:fixed;inset:0;background:rgba(58,49,40,.5);display:none;
    align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal-mask.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:420px;
    max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 12px;font-size:15px;}

  details{margin-bottom:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;}
  details summary{cursor:pointer;padding:13px 14px;font-size:13px;font-weight:600;
    color:var(--accent-d);letter-spacing:1px;list-style:none;
    display:flex;align-items:center;justify-content:space-between;}
  details summary::-webkit-details-marker{display:none;}
  details summary::after{content:"＋";color:var(--sub);font-weight:400;}
  details[open] summary::after{content:"−";}
  details > div{padding:0 14px 14px;}

  .if-card{background:linear-gradient(135deg,#faf6ee,#f0e8db);
    border:1px dashed var(--accent);border-radius:12px;padding:14px;margin-bottom:10px;}
  .if-card .iname{font-weight:600;font-size:14px;color:var(--accent-d);margin-bottom:6px;
    display:flex;align-items:center;gap:6px;}
  .if-card .iname::before{content:"⤳";font-size:16px;}
  .if-card .icontent{font-size:13px;line-height:1.8;white-space:pre-wrap;}

  .file-btn{display:inline-block;width:100%;text-align:center;
    padding:10px 14px;background:transparent;color:var(--accent-d);
    border:1px dashed var(--accent);border-radius:9px;cursor:pointer;font-size:14px;}
  .file-btn input{display:none;}

  .badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;
    padding:1px 6px;border-radius:10px;margin-left:6px;letter-spacing:.5px;vertical-align:middle;}

  .splash{background:linear-gradient(160deg,#fff 0%,#faf6ee 100%);
    text-align:center;padding:30px 24px;border-radius:18px;
    border:1px solid var(--line);max-width:340px;}
  .splash .logo{font-size:18px;font-weight:600;letter-spacing:2px;color:var(--ink);margin-bottom:6px;}
  .splash .qq{font-size:13px;color:var(--accent-d);margin-bottom:18px;letter-spacing:1px;}
  .splash .msg{font-size:13px;line-height:2;color:var(--sub);}
  .splash .msg .em{color:var(--ink);font-weight:500;}
  .splash button{margin-top:18px;padding:10px 36px;}

  .warn{text-align:center;padding:8px 4px;}
  .warn .ico{font-size:36px;margin-bottom:8px;}
  .warn .wmsg{font-size:15px;color:var(--ink);letter-spacing:1px;line-height:2;}
</style>
</head>
<body>

<header>
  <h1>177のuser生成器</h1>
  <div class="sub">U S E R · G E N</div>
</header>

<nav class="tabs">
  <div class="tab active" data-tab="make">创建</div>
  <div class="tab" data-tab="hist">历史</div>
  <div class="tab" data-tab="cfg">配置</div>
</nav>

<main>

  <section class="panel active" id="panel-make">

    <div class="card">
      <div class="ctitle">📥 导入 char 生成 user 大纲</div>
      <div class="hint" style="margin-bottom:8px;">支持 .txt / .docx / .md，AI 会严格按文档内容（包括与 char 的关系、性别等）生成适配 user。</div>
      <label class="file-btn" for="charFile">
        📄 选择 char 文件 (txt / docx / md)
        <input type="file" id="charFile" accept=".txt,.docx,.md,text/plain" />
      </label>
      <div id="charFileName" class="hint" style="margin-top:6px;"></div>
      <textarea id="charPreview" placeholder="或直接粘贴 char 卡内容到这里…" style="margin-top:8px;min-height:80px;"></textarea>
      <label>关系/身份提示（可选，强烈建议填写）</label>
      <input id="charRel" placeholder="例：user是char的妹妹 / 青梅竹马 / 同事关系" />
      <div class="btn-row">
        <button id="btnImportChar">分析并填入表单</button>
        <button class="ghost" id="btnClearChar">🗑 清空</button>
      </div>
      <div id="importStatus" class="status"></div>
    </div>

    <details open><summary>① 基础信息</summary><div>
      <label>姓名 <span style="color:var(--err);">*</span></label>
      <input id="f_name" placeholder="例：林清辞" />
      <div class="row">
        <div><label>性别</label><input id="f_gender" placeholder="女/男/其他" /></div>
        <div><label>年龄</label><input id="f_age" placeholder="例：22" /></div>
      </div>
      <div class="row">
        <div><label>身高</label><input id="f_height" placeholder="例：165cm" /></div>
        <div><label>生日/星座</label><input id="f_birth" placeholder="例：白羊座" /></div>
      </div>
      <label>身份/职业</label>
      <textarea id="f_job" class="compact" placeholder="例：大三美院学生"></textarea>
      <label>居住地</label><input id="f_city" placeholder="例：上海" />
    </div></details>

    <details><summary>② 外貌特征</summary><div>
      <label>外貌关键词</label><textarea id="f_appear" placeholder="例：单眼皮, 黑眼圈"></textarea>
      <label>发型/发色</label>
      <textarea id="f_hair" class="compact" placeholder="例：齐肩黑长直"></textarea>
      <label>气质氛围</label>
      <textarea id="f_aura" class="compact" placeholder="例：清冷书卷气"></textarea>
    </div></details>

    <details><summary>③ 性格</summary><div>
      <label>性格关键词</label><textarea id="f_traits" placeholder="例：表面温和, 嘴硬心软"></textarea>
      <label>MBTI/标签</label><input id="f_mbti" placeholder="例：INFJ" />
      <label>说话风格</label>
      <textarea id="f_speech" class="compact" placeholder="例：语速慢, 偶尔阴阳怪气"></textarea>
    </div></details>

    <details><summary>④ 穿搭风格</summary><div>
      <label>风格关键词</label><textarea id="f_style" placeholder="例：复古文艺, 大地色"></textarea>
      <label>常见单品</label>
      <textarea id="f_items" class="compact" placeholder="例：马丁靴, 帆布包"></textarea>
    </div></details>

    <details><summary>⑤ 家庭背景</summary><div>
      <label>家庭关键词</label><textarea id="f_family" placeholder="例：父母离异, 跟母亲生活"></textarea>
    </div></details>

    <details><summary>⑥ 过去经历</summary><div>
      <label>童年关键词</label><textarea id="f_child" placeholder="例：转学三次"></textarea>
      <label>少年/青春期</label><textarea id="f_teen" placeholder="例：高中艺术生"></textarea>
      <label>重要事件</label><textarea id="f_event" placeholder="例：18岁外婆去世"></textarea>
    </div></details>

    <details><summary>⑦ 现状 & 关系</summary><div>
      <label>当前状态</label><textarea id="f_now" placeholder="例：休学 gap year"></textarea>
      <label>感情/人际</label><textarea id="f_relation" placeholder="例：单身, 朋友很少"></textarea>
    </div></details>

    <details><summary>⑧ 爱好 & 喜好</summary><div>
      <label>爱好</label><textarea id="f_hobby" placeholder="例：胶片摄影"></textarea>
      <label>喜欢</label>
      <textarea id="f_like" class="compact" placeholder="例：雨后味道"></textarea>
      <label>讨厌</label>
      <textarea id="f_dislike" class="compact" placeholder="例：吵闹, 香菜"></textarea>
    </div></details>

    <details><summary>⑨ 其他补充</summary><div>
      <label>小怪癖/习惯</label><textarea id="f_quirk" placeholder="例：紧张时咬下嘴唇"></textarea>
      <label>秘密/隐藏面</label><textarea id="f_secret" placeholder="例：偷偷写小说"></textarea>
      <label>其他</label><textarea id="f_other" placeholder="任何想让 AI 知道的设定"></textarea>
    </div></details>

    <div class="card">
      <label>生成倾向（可选）</label>
      <input id="f_tone" placeholder="例：文笔细腻 / 简洁条目式" />
      <div class="btn-row">
        <button id="btnGen">✨ 生成完整人设（含衣橱）</button>
        <button class="ghost" id="btnClear">清空表单</button>
      </div>
      <div class="hint">生成成功后会自动存档到「历史」</div>
      <div id="genStatus" class="status"></div>
    </div>

    <div id="result"><div class="empty">填写标签后点击生成 ✦</div></div>

  </section>

  <section class="panel" id="panel-hist">
    <div class="card">
      <div class="ctitle">历史 user</div>
      <div id="histList"><div class="empty">还没有存档</div></div>
    </div>
  </section>

  <section class="panel" id="panel-cfg">
    <div class="card">
      <div class="ctitle">API 预设</div>
      <select id="presetSelect"><option value="">— 选择预设 —</option></select>
      <div class="btn-row">
        <button class="ghost" id="btnSavePreset">另存为预设</button>
        <button class="danger" id="btnDelPreset">删除当前预设</button>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">API 配置</div>
      <label>Base URL</label>
      <input id="baseUrl" type="url" inputmode="url" autocomplete="off" placeholder="https://api.openai.com/v1" />
      <label>API Key</label>
      <input id="apiKey" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="sk-..." />
      <div class="hint">使用普通文本输入，不弹出安全键盘</div>
      <label>模型</label>
      <select id="modelSelect"><option value="">— 请先拉取 —</option></select>
      <input id="modelManual" placeholder="或手动输入模型名" style="margin-top:6px;" />
      <label>温度 (temperature)</label>
      <input id="temperature" type="number" step="0.1" min="0" max="2" value="0.85" />
      <div class="btn-row">
        <button class="ghost" id="btnFetchModels">拉取模型</button>
        <button class="ghost" id="btnTest">测试连接</button>
        <button id="btnSaveCfg">保存配置</button>
      </div>
      <div id="cfgStatus" class="status"></div>
    </div>
  </section>

</main>

<div class="modal-mask" id="modalMask">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const LS={cfg:'ug_cfg',presets:'ug_presets',hist:'ug_hist'};
const $=id=>document.getElementById(id);
const FIELDS=['name','gender','age','height','birth','job','city','appear','hair','aura',
  'traits','mbti','speech','style','items','family','child','teen','event','now',
  'relation','hobby','like','dislike','quirk','secret','other','tone'];

/* ===== 选项配置 ===== */
const CHIP_OPTIONS={
  f_gender:{mode:'single',opts:['女','男','无性别','双性','跨性别']},
  f_age:{mode:'single',opts:['14','16','18','20','22','24','26','28','30','35']},
  f_height:{mode:'single',opts:['150cm','155cm','160cm','165cm','170cm','175cm','180cm','185cm']},
  f_birth:{mode:'single',opts:['白羊座','金牛座','双子座','巨蟹座','狮子座','处女座','天秤座','天蝎座','射手座','摩羯座','水瓶座','双鱼座']},
  f_job:{mode:'multi',opts:['高中生','大学生','研究生','上班族','教师','医生','护士','警察','设计师','程序员','摄影师','演员','歌手','作家','画家','咖啡师','自由职业','无业']},
  f_city:{mode:'single',opts:['北京','上海','广州','深圳','成都','杭州','重庆','南京','西安','厦门','长沙','国外']},
  f_appear:{mode:'multi',opts:['单眼皮','双眼皮','桃花眼','丹凤眼','锁骨清晰','黑眼圈','小酒窝','虎牙','长睫毛','痣','雀斑','薄唇','厚唇','尖下巴']},
  f_hair:{mode:'multi',opts:['黑长直','齐肩短发','短发','双马尾','单马尾','半丸子头','卷发','烫发','挑染','染色发','刘海','无刘海','马尾']},
  f_aura:{mode:'multi',opts:['清冷','温柔','元气','慵懒','病娇','御姐','软糯','冷淡','阳光','文艺','精英感','疏离','邻家','禁欲']},
  f_traits:{mode:'multi',opts:['内向','外向','温柔','高冷','毒舌','腹黑','嘴硬心软','钝感','神经质','完美主义','乐观','悲观','怕生','共情力强','控制欲强','社恐','社牛','理性','感性']},
  f_mbti:{mode:'single',opts:['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP']},
  f_speech:{mode:'multi',opts:['语速快','语速慢','轻声细语','直来直去','阴阳怪气','喜欢吐槽','不爱说话','礼貌用语','爱用颜文字','喜欢反问','奶音','低音']},
  f_style:{mode:'multi',opts:['复古','甜美','酷飒','学院风','文艺','极简','性冷淡','暗黑','JK','Lolita','街头','商务','大地色系','黑白灰','森系','辣妹']},
  f_items:{mode:'multi',opts:['马丁靴','帆布鞋','小白鞋','高跟鞋','帆布包','双肩包','银戒指','项链','耳钉','棒球帽','贝雷帽','围巾','卫衣','衬衫','风衣','牛仔裤','百褶裙']},
  f_hobby:{mode:'multi',opts:['阅读','摄影','音乐','看电影','打游戏','画画','写作','健身','跑步','烹饪','旅行','收藏','手工','二次元','刷剧','撸猫','逛展']},
  f_like:{mode:'multi',opts:['雨天','晴天','黑咖啡','奶茶','甜食','辣','猫','狗','古典乐','摇滚','安静','独处','夏天','冬天','深夜','清晨']},
  f_dislike:{mode:'multi',opts:['吵闹','香菜','拥挤','加班','早起','应酬','谎言','油腻','等待','被打断','虚伪','社交']},
};

/* ===== 渲染选项 ===== */
function renderChips(){
  for(const [id,cfg] of Object.entries(CHIP_OPTIONS)){
    const target=$(id);
    if(!target||target.parentNode.querySelector(`.chips[data-for="${id}"]`))continue;
    const wrap=document.createElement('div');
    wrap.className='chips';
    wrap.dataset.for=id;
    cfg.opts.forEach(v=>{
      const chip=document.createElement('span');
      chip.className='chip';
      chip.textContent=v;
      chip.dataset.target=id;
      chip.dataset.val=v;
      chip.dataset.mode=cfg.mode;
      chip.onclick=()=>handleChip(chip);
      wrap.appendChild(chip);
    });
    target.parentNode.insertBefore(wrap,target.nextSibling);
  }
  syncChips();
}
function handleChip(chip){
  const target=$(chip.dataset.target);
  const val=chip.dataset.val;
  const mode=chip.dataset.mode;
  if(mode==='single'){
    if(target.value.trim()===val){
      target.value='';chip.classList.remove('on');
    }else{
      target.value=val;
      chip.parentNode.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      chip.classList.add('on');
    }
  }else{
    let cur=target.value.trim();
    const parts=cur?cur.split(/[,，、]\s*/).map(s=>s.trim()).filter(Boolean):[];
    const idx=parts.indexOf(val);
    if(idx>=0){parts.splice(idx,1);chip.classList.remove('on');}
    else{parts.push(val);chip.classList.add('on');}
    target.value=parts.join('、');
  }
}
function syncChips(){
  document.querySelectorAll('.chip').forEach(c=>{
    const target=$(c.dataset.target);if(!target)return;
    const val=c.dataset.val;
    const mode=c.dataset.mode;
    const cur=target.value||'';
    if(mode==='single'){
      c.classList.toggle('on',cur.trim()===val);

async function callLLM(messages,opts={}){

}

/* ===== 文件读取 ===== */
async function readTxtSmart(buf){
  const bytes=new Uint8Array(buf);
  if(bytes[0]===0xFF&&bytes[1]===0xFE)return new TextDecoder('utf-16le').decode(buf);
  if(bytes[0]===0xFE&&bytes[1]===0xFF)return new TextDecoder('utf-16be').decode(buf);
  if(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF)return new TextDecoder('utf-8').decode(buf);
  try{return new TextDecoder('utf-8',{fatal:true}).decode(buf);}catch(e){}
  try{return new TextDecoder('gb18030').decode(buf);}catch(e){}
  return new TextDecoder('utf-8').decode(buf);
}
async function readDocx(buf){
  if(typeof JSZip==='undefined')throw new Error('JSZip 未加载，无法解析 docx');
  const zip=await JSZip.loadAsync(buf);
  const docFile=zip.file('word/document.xml');
  if(!docFile)throw new Error('不是有效的 docx 文件');
  const xml=await docFile.async('string');
  const paragraphs=xml.split(/<\/w:p>/);
  const out=[];
  for(const p of paragraphs){
    const texts=[];
    const reg=/<w:t[^>]*>([\s\S]*?)<\/w:t>/g;
    let m;
    while((m=reg.exec(p))!==null){
      texts.push(m[1]
        .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/&quot;/g,'"').replace(/&apos;/g,"'")
        .replace(/&amp;/g,'&'));
    }
    const hasBr=/<w:br\s*\/>/.test(p);
    const line=texts.join('');
    if(line||texts.length){out.push(line+(hasBr?'\n':''));}
  }
  return out.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
async function readFileSmart(file){
  const buf=await file.arrayBuffer();
  const name=file.name.toLowerCase();
  if(name.endsWith('.docx'))return await readDocx(buf);
  return await readTxtSmart(buf);
}

  _current.ifLines.splice(i,1);
  autoArchive();
  renderResult();
};

/* ===== 导出 ===== */
function buildExportText(it){
  let out=`此内容由177QQ2782238002の生成器生成，使用请标明来源\n\n`;
  out+=`══════════════════════\n           ${it.name}\n══════════════════════\n`;
  out+=`生成时间：${new Date(it.time).toLocaleString('zh-CN')}\n\n`;
  out+=it.content;
  if(it.ifLines&&it.ifLines.length){
    out+='\n\n══════════════════════\n           ⤳ IF 线（深度版）\n══════════════════════\n\n';
    it.ifLines.forEach((l,i)=>{out+=`──── IF #${i+1}：${l.scene} ────\n${l.content}\n\n`;});
  }
  return out;
}
window.copyResult=()=>{
  if(!_current)return;
  navigator.clipboard.writeText(buildExportText(_current))
    .then(()=>showStatus($('genStatus'),'✓ 已复制','ok'));
};
window.exportTxt=it=>{
  const text=buildExportText(it);
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`177のuser生成器_${it.name}.txt`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
};

/* ===== 历史 ===== */
function renderHist(){
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const box=$('histList');
  if(!arr.length){box.innerHTML='<div class="empty">还没有存档</div>';return;}
  box.innerHTML=arr.map(it=>`
    <div class="hist-item">
      <div class="hname">${esc(it.name)}
        ${it.ifLines&&it.ifLines.length?`<span class="badge">⤳${it.ifLines.length}</span>`:''}
      </div>
      <div class="hmeta">${new Date(it.time).toLocaleString('zh-CN')}</div>
      <div class="hbtns">
        <button class="ghost" onclick="loadHist(${it.id})">载入编辑</button>
        <button class="ghost" onclick="viewHist(${it.id})">查看</button>
        <button class="ghost" onclick="editHistName(${it.id})">改名</button>
        <button class="ghost" onclick="exportHistById(${it.id})">导出</button>
        <button class="danger" onclick="delHist(${it.id})">删除</button>
      </div>
    </div>`).join('');
}
window.loadHist=id=>{
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const it=arr.find(x=>x.id===id);if(!it)return;
  _current={...it};
  if(it.form)fillForm(it.form);
  document.querySelector('.tab[data-tab="make"]').click();
  renderResult();
  showStatus($('genStatus'),'✓ 已载入，编辑后会自动同步存档','ok');
};
window.viewHist=id=>{
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const it=arr.find(x=>x.id===id);if(!it)return;
  let extra='';
  if(it.ifLines&&it.ifLines.length){
    extra+='<div style="margin-top:14px;font-weight:600;color:var(--accent-d);">⤳ IF 线</div>';
    extra+=it.ifLines.map(l=>`<div class="if-card"><div class="iname">${esc(l.scene)}</div><div class="icontent">${esc(l.content)}</div></div>`).join('');
  }
  openModal(`
    <h3>${esc(it.name)}</h3>
    <div class="user-card" style="max-height:50vh;overflow-y:auto;">${esc(it.content)}</div>
    ${extra}
    <div class="btn-row">
      <button class="ghost" onclick="closeModal()">关闭</button>
      <button onclick="closeModal();exportHistById(${it.id})">导出TXT</button>
      <button onclick="closeModal();editHistContent(${it.id})">编辑正文</button>
    </div>
  `);
};
window.editHistContent=id=>{
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const it=arr.find(x=>x.id===id);if(!it)return;
  openModal(`
    <h3>编辑 ${esc(it.name)} 正文</h3>
    <textarea id="_edit" style="min-height:300px;">${esc(it.content)}</textarea>
    <div class="btn-row">
      <button class="ghost" onclick="closeModal()">取消</button>
      <button onclick="saveHistContent(${id})">保存</button>
    </div>
  `);
};
window.saveHistContent=id=>{
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const it=arr.find(x=>x.id===id);if(!it)return;
  it.content=$('_edit').value;
  localStorage.setItem(LS.hist,JSON.stringify(arr));
  closeModal();renderHist();
};
window.editHistName=id=>{
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const it=arr.find(x=>x.id===id);if(!it)return;
  const n=prompt('新名称：',it.name);
  if(!n||!n.trim())return;
  it.name=n.trim();if(it.form)it.form.name=n.trim();
  localStorage.setItem(LS.hist,JSON.stringify(arr));renderHist();
};
window.exportHistById=id=>{
  const arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  const it=arr.find(x=>x.id===id);if(it)exportTxt(it);
};
window.delHist=id=>{
  if(!confirm('删除该存档？'))return;
  let arr=JSON.parse(localStorage.getItem(LS.hist)||'[]');
  arr=arr.filter(x=>x.id!==id);
  localStorage.setItem(LS.hist,JSON.stringify(arr));renderHist();
};

/* ===== 模态 ===== */
function openModal(html){
  $('modalBox').innerHTML=html;
  $('modalMask').classList.add('show');
}
window.closeModal=()=>$('modalMask').classList.remove('show');
$('modalMask').onclick=e=>{if(e.target===$('modalMask'))closeModal();};

/* init */
loadCfg();loadPresets();
renderChips();
showSplash();
</script>
